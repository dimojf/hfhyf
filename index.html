<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testpunks - Pro NFT Filter Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col items-center py-10 px-4">

    <div class="max-w-4xl w-full bg-slate-900 rounded-2xl p-8 shadow-2xl border border-slate-800">
        <h1 class="text-4xl font-black text-center mb-2 bg-gradient-to-r from-cyan-400 via-purple-500 to-pink-500 bg-clip-text text-transparent tracking-wide">
            Testpunks Pro Filter Studio
        </h1>
        <p class="text-slate-400 text-center mb-8 text-sm">Upload your NFT collection, apply 50+ advanced on-chain filters, and batch download instantly.</p>

        <div class="border-2 border-dashed border-slate-700 hover:border-cyan-500 rounded-xl p-10 text-center cursor-pointer transition-all duration-300 bg-slate-900/50 mb-6 relative group">
            <input type="file" id="imageInput" accept="image/*" multiple class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
            <div class="space-y-3">
                <div class="mx-auto h-14 w-14 text-slate-500 group-hover:text-cyan-400 transition-colors duration-300 flex items-center justify-center bg-slate-800 rounded-full">
                    <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                    </svg>
                </div>
                <p class="text-xl font-semibold text-slate-300">Select NFT Images / Folder</p>
                <p class="text-xs text-slate-500">Supports batch selection of PNG, JPG, WEBP</p>
            </div>
        </div>

        <div class="bg-slate-900/80 p-5 rounded-xl border border-slate-800 mb-6 flex flex-col md:flex-row gap-5 items-end justify-between">
            <div class="w-full md:w-2/3">
                <label for="filterType" class="block text-sm font-semibold text-slate-400 mb-2">🚀 Choose Advanced Color Filter (50+ Options):</label>
                <select id="filterType" class="bg-slate-800 text-slate-200 rounded-lg px-4 py-3 border border-slate-700 focus:outline-none focus:border-cyan-500 w-full font-medium cursor-pointer">
                    
                    <optgroup label="🌈 Color Rotation (Standard Hue Shifts)">
                        <option value="hue30">Hue Shift 30° (Subtle Warmth)</option>
                        <option value="hue60">Hue Shift 60° (Gold-Orange Swap)</option>
                        <option value="hue90">Hue Shift 90° (Lime / Autumn Mix)</option>
                        <option value="hue120">Hue Shift 120° (Greenish / Purple)</option>
                        <option value="hue150">Hue Shift 150° (Deep Turquoise Swap)</option>
                        <option value="hue180">Hue Shift 180° (Perfect Opposite / Negative Flip)</option>
                        <option value="hue210">Hue Shift 210° (Electric Blue Era)</option>
                        <option value="hue240">Hue Shift 240° (Blue / Pink Vibe)</option>
                        <option value="hue270">Hue Shift 270° (Deep Purple Magic)</option>
                        <option value="hue300">Hue Shift 300° (Magenta Punch)</option>
                        <option value="hue330">Hue Shift 330° (Hot Pink Neon)</option>
                        <option value="hue345">Hue Shift 345° (Rose / Crimson Boost)</option>
                    </optgroup>

                    <optgroup label="🔥 Cyberpunk & Web3 Future Trends">
                        <option value="cyberpunk">Cyberpunk Neon (Cyan/Pink Boost)</option>
                        <option value="matrix">The Matrix (Digital Green Acid)</option>
                        <option value="infrared">Infrared Thermal (Predator Vision)</option>
                        <option value="tokyo">Tokyo Night (Deep Blues & Purples)</option>
                        <option value="toxic">Toxic Waste (Radioactive Lime)</option>
                        <option value="synthwave">Synthwave Grid (Sunset Magenta & Yellow)</option>
                        <option value="hyperBeast">Hyper Beast (Over-saturated Trippy)</option>
                        <option value="quantum">Quantum Realm (Deep Cosmic Violet)</option>
                        <option value="laserTag">Laser Tag (Neon Highlighting)</option>
                        <option value="metaverse">Metaverse Glitch (Ghostly Digital Overlay)</option>
                    </optgroup>

                    <optgroup label="👑 Precious Metals & Gem Rarities">
                        <option value="gold">Liquid Gold (Metallic Gold Treasure)</option>
                        <option value="silver">Sterling Silver (Pure Metallic Shimmer)</option>
                        <option value="bronze">Ancient Bronze (Rustic Bronze Shading)</option>
                        <option value="ruby">Deep Ruby (Blood Red Premium)</option>
                        <option value="emerald">Jade Emerald (Rich Green Diamond Look)</option>
                        <option value="sapphire">Ocean Sapphire (Deep Crystal Blue)</option>
                        <option value="amethyst">Royal Amethyst (Pure Velvet Purple)</option>
                        <option value="platinum">Ice Platinum (Bright Cyber White Metal)</option>
                        <option value="diamond">Diamond Dust (High Contrast Clean White)</option>
                        <option value="obsidian">Obsidian Black (Dark Shadow Luxury)</option>
                    </optgroup>

                    <optgroup label="🌅 Multi-Tone Mixed Palettes">
                        <option value="sunset">Solana Sunset (Orange/Purple Fade)</option>
                        <option value="frozen">Frozen Tundra (Ice Blue & Clean White)</option>
                        <option value="mars">Mars Rover (Dusty Red & Desert Orange)</option>
                        <option value="deepSea">Abyssal Deep Sea (Navy & Cyan Shadow)</option>
                        <option value="bubblegum">Bubblegum Pop (Pastel Pink & Baby Blue)</option>
                        <option value="radioactive">Radioactive Yellow (High Voltage Sulfur)</option>
                        <option value="zombie">Zombie Apocalypse (Decayed Green & Brown)</option>
                        <option value="candy">Cotton Candy (Sweet Pink Teal Combo)</option>
                        <option value="supernova">Supernova Flare (Blazing Red-Hot Core)</option>
                        <option value="aurora">Aurora Borealis (Northern Green & Purple)</option>
                    </optgroup>

                    <optgroup label="🎭 Vintage & Aesthetic Comic">
                        <option value="invert">Invert Colors (Classic Negative)</option>
                        <option value="grayscale">Pure Grayscale (Classic B&W)</option>
                        <option value="sepia">Warm Sepia (Vintage Rare)</option>
                        <option value="vintage">90s Comic (High Contrast Retro)</option>
                        <option value="monochromeBlue">Monochrome Blue (Ice Crypto)</option>
                        <option value="monochromeRed">Monochrome Red (Virtual Boy Alert)</option>
                        <option value="ghost">Ghost Mint (High Exposure White)</option>
                        <option value="darkKnight">Dark Knight (Deep Shadow Noir)</option>
                        <option value="solarize">Solarized (Surreal Abstract Art)</option>
                        <option value="popArt">Andy Warhol Pop Art (Extreme Posterized)</option>
                    </optgroup>
                </select>
            </div>

            <button id="processBtn" class="w-full md:w-1/3 bg-gradient-to-r from-cyan-500 to-purple-600 hover:from-cyan-600 hover:to-purple-700 text-white font-bold py-3 px-6 rounded-lg transition-all duration-300 shadow-lg disabled:opacity-40 disabled:cursor-not-allowed" disabled>
                ✨ Apply Filter to All
            </button>
        </div>

        <div id="statusSection" class="hidden bg-slate-900/90 p-5 rounded-xl border border-slate-800 text-center mb-6">
            <p id="statusText" class="text-sm font-semibold text-cyan-400 mb-3">Processing images...</p>
            <div class="w-full bg-slate-800 rounded-full h-3 mb-5 overflow-hidden">
                <div id="progressBar" class="bg-gradient-to-r from-cyan-400 to-purple-500 h-full transition-all duration-300" style="width: 0%"></div>
            </div>
            <button id="downloadBtn" class="hidden mx-auto bg-emerald-500 hover:bg-emerald-600 text-white font-extrabold py-3 px-10 rounded-lg transition-all duration-300 shadow-lg shadow-emerald-900/30 items-center gap-2 text-lg transform hover:scale-105">
                📥 Download Filtered ZIP (1-Click)
            </button>
        </div>

        <div>
            <h3 class="text-md font-bold mb-3 text-slate-400 tracking-wider uppercase text-xs">Live Preview (First 4 Files):</h3>
            <div id="previewGrid" class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                <p class="text-slate-600 text-sm col-span-full italic py-4 text-center">No images uploaded yet.</p>
            </div>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const filterType = document.getElementById('filterType');
        const processBtn = document.getElementById('processBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const previewGrid = document.getElementById('previewGrid');
        const statusSection = document.getElementById('statusSection');
        const statusText = document.getElementById('statusText');
        const progressBar = document.getElementById('progressBar');

        let uploadedFiles = [];
        let processedImages = [];

        imageInput.addEventListener('change', (e) => {
            uploadedFiles = Array.from(e.target.files);
            if (uploadedFiles.length > 0) {
                processBtn.disabled = false;
                previewGrid.innerHTML = '';
                
                uploadedFiles.slice(0, 4).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const div = document.createElement('div');
                        div.className = 'bg-slate-800 p-2 rounded-lg border border-slate-700 flex flex-col items-center';
                        div.innerHTML = `
                            <img src="${event.target.result}" class="w-full h-28 object-cover rounded-md mb-2">
                            <span class="text-xs text-slate-400 truncate w-full text-center font-mono">${file.name}</span>
                        `;
                        previewGrid.appendChild(div);
                    };
                    reader.readAsDataURL(file);
                });
                if(uploadedFiles.length > 4) {
                    const moreText = document.createElement('p');
                    moreText.className = 'text-xs text-slate-500 col-span-full mt-2 italic text-center';
                    moreText.innerText = `+ ${uploadedFiles.length - 4} more files loaded safely.`;
                    previewGrid.appendChild(moreText);
                }
            }
        });

        processBtn.addEventListener('click', async () => {
            if (uploadedFiles.length === 0) return;

            statusSection.classList.remove('hidden');
            downloadBtn.classList.add('hidden');
            processBtn.disabled = true;
            processedImages = [];

            const selectedFilter = filterType.value;
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            for (let i = 0; i < uploadedFiles.length; i++) {
                const file = uploadedFiles[i];
                statusText.innerText = `⚡ Filtering: ${file.name} (${i + 1}/${uploadedFiles.length})`;
                
                const img = await loadImage(file);
                canvas.width = img.width;
                canvas.height = img.height;
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                applyFilterToContext(ctx, selectedFilter, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);

                ctx.filter = 'none';

                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                processedImages.push({ name: file.name, blob: blob });

                const percent = Math.round(((i + 1) / uploadedFiles.length) * 100);
                progressBar.style.width = `${percent}%`;
            }

            statusText.innerText = `🎉 Successfully processed ${uploadedFiles.length} NFTs with the chosen style!`;
            downloadBtn.classList.remove('hidden');
            downloadBtn.style.display = 'flex';
            processBtn.disabled = false;
        });

        function applyFilterToContext(ctx, filter, w, h) {
            // ৫২টি অ্যাডভান্সড সিএসএস ফিল্টার ম্যাপিং ডিকশনারি
            const filters = {
                // Hue Rotations
                hue30: 'hue-rotate(30deg)',
                hue60: 'hue-rotate(60deg)',
                hue90: 'hue-rotate(90deg)',
                hue120: 'hue-rotate(120deg)',
                hue150: 'hue-rotate(150deg)',
                hue180: 'hue-rotate(180deg)',
                hue210: 'hue-rotate(210deg)',
                hue240: 'hue-rotate(240deg)',
                hue270: 'hue-rotate(270deg)',
                hue300: 'hue-rotate(300deg)',
                hue330: 'hue-rotate(330deg)',
                hue345: 'hue-rotate(345deg)',

                // Cyberpunk & Future
                cyberpunk: 'hue-rotate(140deg) saturate(2.5) contrast(1.2)',
                matrix: 'grayscale(0.3) hue-rotate(90deg) saturate(3) brightness(0.95) contrast(1.1)',
                infrared: 'invert(1) hue-rotate(280deg) saturate(3.5)',
                tokyo: 'hue-rotate(250deg) contrast(1.3) brightness(0.85)',
                toxic: 'hue-rotate(70deg) saturate(4) contrast(1.3)',
                synthwave: 'hue-rotate(310deg) saturate(2.2) brightness(1.1) contrast(1.1)',
                hyperBeast: 'saturate(6) contrast(1.5) hue-rotate(15deg)',
                quantum: 'hue-rotate(280deg) saturate(1.8) brightness(0.7) contrast(1.4)',
                laserTag: 'contrast(1.8) saturate(2) hue-rotate(190deg) brightness(1.1)',
                metaverse: 'hue-rotate(120deg) invert(0.1) saturate(2) brightness(1.05)',

                // Precious Metals & Gems
                gold: 'grayscale(0.2) sepia(1) hue-rotate(10deg) saturate(3.5) contrast(1.25) brightness(1.05)',
                silver: 'grayscale(1) brightness(1.2) contrast(1.3)',
                bronze: 'sepia(0.8) hue-rotate(350deg) saturate(2) contrast(1.1) brightness(0.9)',
                ruby: 'grayscale(0.4) sepia(1) hue-rotate(320deg) saturate(5) contrast(1.3)',
                emerald: 'grayscale(0.3) sepia(1) hue-rotate(85deg) saturate(4.5) contrast(1.2)',
                sapphire: 'grayscale(0.3) sepia(1) hue-rotate(190deg) saturate(5) contrast(1.2)',
                amethyst: 'grayscale(0.2) sepia(1) hue-rotate(260deg) saturate(4.5) contrast(1.1)',
                platinum: 'grayscale(1) brightness(1.4) contrast(1.5) saturate(0.5)',
                diamond: 'contrast(2) brightness(1.3) grayscale(0.5)',
                obsidian: 'brightness(0.35) contrast(1.8) grayscale(0.3)',

                // Multi-Tone Mixed
                sunset: 'hue-rotate(340deg) saturate(2.5) contrast(1.15)',
                frozen: 'hue-rotate(180deg) saturate(1.5) brightness(1.1) contrast(1.2)',
                mars: 'sepia(0.5) hue-rotate(330deg) saturate(3) contrast(1.4) brightness(0.85)',
                deepSea: 'hue-rotate(200deg) brightness(0.6) contrast(1.6)',
                bubblegum: 'hue-rotate(300deg) saturate(1.6) brightness(1.2) contrast(0.9)',
                radioactive: 'hue-rotate(55deg) saturate(5) contrast(1.5) brightness(1.1)',
                zombie: 'sepia(0.6) hue-rotate(60deg) saturate(1.2) brightness(0.8) contrast(1.2)',
                candy: 'hue-rotate(160deg) saturate(3) contrast(1.1) brightness(1.1)',
                supernova: 'hue-rotate(350deg) saturate(4) brightness(1.2) contrast(1.3)',
                aurora: 'hue-rotate(100deg) saturate(2.5) contrast(1.2) brightness(0.95)',

                // Vintage & Photo Art
                invert: 'invert(1)',
                grayscale: 'grayscale(1)',
                sepia: 'sepia(1)',
                vintage: 'sepia(0.7) contrast(1.4) brightness(0.95)',
                monochromeBlue: 'grayscale(1) sepia(1) hue-rotate(175deg) saturate(4)',
                monochromeRed: 'grayscale(1) sepia(1) hue-rotate(330deg) saturate(5)',
                ghost: 'brightness(2.2) contrast(2) grayscale(0.1)',
                darkKnight: 'brightness(0.45) contrast(1.6) saturate(0.6)',
                solarize: 'difference invert(0.25) contrast(1.3)',
                popArt: 'saturate(3) contrast(2.5) brightness(1.1)'
            };

            ctx.filter = filters[filter] || 'none';
        }

        function loadImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        downloadBtn.addEventListener('click', () => {
            const zip = new JSZip();
            processedImages.forEach(item => {
                zip.file(item.name, item.blob);
            });

            statusText.innerText = "⚡ Packing your collection into ZIP... Please wait.";

            zip.generateAsync({ type: 'blob' }).then((content) => {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = "Testpunks_Pro_Filtered_NFTs.zip";
                link.click();
                statusText.innerText = "🚀 ZIP File Downloaded Successfully!";
            });
        });
    </script>
</body>
</html>
