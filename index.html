<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Buy Shop BD | NFT Shuffler</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PapaParse for CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <!-- JSZip for creating the downloadable ZIP file -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- FileSaver for triggering the download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f8fafc; }
        .drag-area { border: 2px dashed #3b82f6; transition: all 0.3s ease; }
        .drag-area:hover { background-color: #1e293b; border-color: #60a5fa; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-2xl w-full bg-slate-800 rounded-2xl shadow-2xl p-8 border border-slate-700">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">
                NFT Metadata & Image Shuffler
            </h1>
            <p class="text-slate-400 text-sm">Upload your FiFARO.csv and NFT images. Everything will be randomized while keeping exact character traits intact without losing image quality.</p>
        </div>

        <div class="space-y-6">
            <!-- CSV Upload -->
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">1. Upload CSV File (e.g., FiFARO.csv)</label>
                <div class="drag-area rounded-xl p-4 text-center cursor-pointer relative">
                    <input type="file" id="csvFile" accept=".csv" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                    <span class="text-slate-400" id="csvFileName">Click or drag your CSV file here</span>
                </div>
            </div>

            <!-- Images Upload -->
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">2. Upload All NFT Images (1.png, 2.png...)</label>
                <div class="drag-area rounded-xl p-4 text-center cursor-pointer relative">
                    <input type="file" id="imageFiles" accept="image/*" multiple class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                    <span class="text-slate-400" id="imgFilesName">Click or drag all image files here</span>
                </div>
            </div>

            <!-- Action Button -->
            <button id="shuffleBtn" class="w-full bg-gradient-to-r from-blue-600 to-emerald-600 hover:from-blue-500 hover:to-emerald-500 text-white font-bold py-3 px-4 rounded-xl shadow-lg transform transition active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                Shuffle & Download ZIP
            </button>
            
            <!-- Status Message -->
            <div id="status" class="text-center text-sm font-medium text-emerald-400 hidden mt-4">
                Processing... Please wait.
            </div>
        </div>
    </div>

    <script>
        // Display selected file names
        document.getElementById('csvFile').addEventListener('change', function(e) {
            document.getElementById('csvFileName').innerText = e.target.files[0] ? e.target.files[0].name : "Click or drag your CSV file here";
        });
        
        document.getElementById('imageFiles').addEventListener('change', function(e) {
            const count = e.target.files.length;
            document.getElementById('imgFilesName').innerText = count > 0 ? `${count} images selected` : "Click or drag all image files here";
        });

        // Main Shuffle Logic
        document.getElementById('shuffleBtn').addEventListener('click', function() {
            const csvInput = document.getElementById('csvFile').files[0];
            const imgInput = document.getElementById('imageFiles').files;
            const statusBox = document.getElementById('status');

            if (!csvInput || imgInput.length === 0) {
                alert("Please upload both the CSV file and the Images first!");
                return;
            }

            statusBox.style.display = 'block';
            statusBox.innerText = "Parsing CSV and matching images...";
            statusBox.className = "text-center text-sm font-medium text-blue-400 mt-4";

            Papa.parse(csvInput, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    let csvData = results.data;
                    
                    // Sort uploaded images numerically by their filename (e.g., 1.png, 2.png, 10.png)
                    let imagesArray = Array.from(imgInput).sort((a, b) => {
                        let numA = parseInt(a.name.match(/\d+/)?.[0] || 0);
                        let numB = parseInt(b.name.match(/\d+/)?.[0] || 0);
                        return numA - numB;
                    });

                    // Match CSV rows with Images
                    let pairedItems = [];
                    for(let i = 0; i < csvData.length; i++) {
                        if(imagesArray[i]) {
                            pairedItems.push({
                                rowData: csvData[i],
                                imageFile: imagesArray[i]
                            });
                        }
                    }

                    if(pairedItems.length === 0) {
                        alert("Could not match images to CSV rows. Make sure image names contain numbers.");
                        statusBox.style.display = 'hidden';
                        return;
                    }

                    statusBox.innerText = "Randomizing pairs safely...";

                    // Shuffle the paired array (Fisher-Yates Algorithm)
                    for (let i = pairedItems.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [pairedItems[i], pairedItems[j]] = [pairedItems[j], pairedItems[i]];
                    }

                    // Re-assign logic and create ZIP
                    let zip = new JSZip();
                    let newImagesFolder = zip.folder("Randomized_Images");
                    let finalCsvData = [];

                    statusBox.innerText = "Packaging high-quality images and new CSV...";

                    pairedItems.forEach((item, index) => {
                        let newNumber = index + 1;
                        let newImageName = `${newNumber}.png`;

                        // Add original untouched image blob to zip with new name
                        newImagesFolder.file(newImageName, item.imageFile);

                        // Clone row data to avoid mutating original references
                        let newRow = { ...item.rowData };
                        
                        // Dynamically update standard image columns if they exist, leaving "name" untouched
                        if(newRow['image']) newRow['image'] = newImageName;
                        if(newRow['file_name']) newRow['file_name'] = newImageName;
                        if(newRow['compiler']) newRow['compiler'] = "Easy Buy Shop BD Engine"; 
                        
                        finalCsvData.push(newRow);
                    });

                    // Generate new CSV
                    let newCsvString = Papa.unparse(finalCsvData);
                    zip.file("FiFARO_Randomized.csv", newCsvString);

                    // Download ZIP
                    zip.generateAsync({type:"blob"}).then(function(content) {
                        saveAs(content, "Randomized_NFT_Collection.zip");
                        statusBox.innerText = "Download Complete! Please check your files.";
                        statusBox.className = "text-center text-sm font-medium text-emerald-400 mt-4";
                    });
                }
            });
        });
    </script>
</body>
</html>
